body:
  text: 太上北極第一神符此符佩之令人長生久視辟屍滅魔貼房室之中却諸邪精太上北極第二神符此符即北極酆都上清神符辟屍大籙太上北極第三神符此符治一切疾病佩之則保身護命度厄延生禁斷諸鬼斬伐邪神去災滅禍太上北極第四神符此符即北極眞書玉文辟屍神籙救治世民萬病千災誅斬邪鬼戴之頭上辟屍千里若所在有精魅以符貼之即滅矣太上北極第五神符此符驅斬蜚屍鬼魅邪精應被死喪之家爲害之者佩之則護身吉利太上北極第六神符此符祛厭水火災厄冝佩之及貼門上鎮中庭大吉太上北極第七神符此符去除瘟疾瘴毒佩之則身命永安鬼魅消滅太上北極第八神符此符解穢辟惡佩之則護身吉昌萬邪莫敢干犯右八符北帝所救世民一切凶横緫而佩之永無衆惡其妙非小功耳北帝大殺鬼符北帝驅鬼滅惡魔符北帝逐鬼魔符右件符篆並用丹書北極酆都六宫名酆都山左北方癸地故東北爲鬼户死氣之根山高二千六百里週迴三萬里其山之洞天在山之下週迴一萬五千里其上下皆有鬼神宫室山上有十二宫領鬼下有十二宫統神每一宫週迴千里上宫左右各有六宫下宫左右亦各有六宫故二十四宫也上六宫第一宫紂絶隂天宫第二宫泰殺諒事宗天宫第三宫明晨耐犯武城天宫第四宫恬照罪炁天宫第五宫宗靈七非天宫第六宫敢司連宛屢天宫下六宫第一宫休明緫靈洞天宫第二宫玄司重正宗靈天宫第三宫統仙昇靈希微天宫第四宫正眞紹靈宛司天宫第五宫雲婁玉紀明晨天宫第六宫崇虚赤映雲曲天宫學眞之士知酆都山上下鬼宫之名百鬼不敢干害夜卧之時向北而坐左叩齒七通右叩齒五通中叩齒三通祝宫門三通即念制鬼神呪六宫門制鬼呪吾是太上第子下統六天六洞之宫是吾所部不但所部乃太上之所生吾知六天宫門之名是故長生敢有犯者太上斬汝急急如律令右誦六宫門呪畢即念北極神呪北極制魔呪紂絶摽帝晨諒事遘重阿炎如霄中烟勃若景耀華武城帶神鋒恬照吞清河閶闔臨丹井雲門鬱嵯峨七非通竒蓋連宛亦敷魔六天横北道此是鬼神家召六天魔王呪辟乾毒王六天鬼王震拾羅鈴北極魔王四天皛皛酆都鬼相巴元醜伯九天都録緫領萬鬼敢有不從急急如律令右誦畢存北極天蓬大元帥三頭六臂執鉞斧弓箭劍鐸戟索六物身長五十丈黑衣玄冠金甲領神兵三十六萬衆乃叩齒三十六通微誦其呪天蓬元帥呪天蓬天蓬九元殺童五丁都司高刀北翁七政八靈太上皓兇長顱巨獸手把帝鐘素梟三神嚴駕夔龍威劍神王斬邪滅蹤紫炁乘天丹霞赫衝吞魔食鬼横身飲風蒼舌緑齒四目老翁天丁力士威南禦兇天騶激厲威北銜鋒三十萬兵衛我九重辟屍千里驅却不祥敢有小鬼欲來見狀钁天大斧斬鬼五形炎帝烈血北斗然骨四明破骸天猷滅類神刀一下萬鬼自潰急急如律令誦畢次念火鈴大呪吾是帝君之臣名書玉清下統六天北極鬼宫悉是我營我之所部何鬼敢生右佩豁落左帶火鈴擲火萬里威制萬靈有犯者戮有干者刑帝君有令收捕無停天光駭動群魔束形鬼妖滅種我得長生急急如律令凡誦是咒當清心靜念即感北極太玄諸靈官降衛兆身千災消滅群魔束形長生久視克得神仙北極殺鬼印酆都召鬼神印各長三寸闊二寸一分右二印一曰北極殺鬼印治一切疾病一曰北極酆都召鬼神印若世人被惡鬼山魈古怪所加使人狂言或入水火者以印印病者心上病人悉能言爲患之鬼其病立差北極天蓬印天丁神印各長三寸闊二寸一分右二印一曰北極天蓬印制伏隂魔救治疾病一曰天丁神印滅鬼祟治疾病佩之大吉北極監殺神印帝君印各長闊一寸二分右二印一曰北極監殺神印攝管諸神魔鬼一曰帝君印佩之前人禮敬魔鬼不干太微帝君印長闊一寸二分天帝神印長闊一寸二分右二印一曰太微帝君印佩之能使一切畏伏攝召神靈一曰天帝神印佩之則身得長生仙人護衛北極大將軍印治病使者印各長闊一寸二分右二印一曰北極大將軍印佩之能伏强蟲戰鬭一曰治病使者印佩之辟諸病治百疾癎病吞之即愈天罡印太玄天帝神印各長闊一寸二分右二印一曰天罡印以甲乙日印泥蠟上於病人本命地中埋之即差一曰太玄天帝神印一切奏聞之事用之能治萬病印病者心上立愈已上諸印並以雷霹棗木心刻之以甲子日或正月五日夏中丙午日三祭畢而後用之北極勑印呪太上神靈炎帝之精光霞電掣明耀三清流火萬里鬼無逃形神印一下伏滅邪精三五將軍豁落吏兵平天戛地誅鬼不停飛符走印頭戴五星擲火前殺萬鬼千精六天鬼賊付與丙丁五靈眞老是吾本師無碍神通萬靈同歸惡鬼絶滅不祥必追中黄九道威布四維伏匿故氣不漏纖遺五瘟七疰吾能殺之何鬼敢拒何神敢虧酆都戮形北斗斬屍神刀一下萬鬼消糜急急如律令北極天丁神呪大道有神名曰天丁奉承九天受事三清下遊於世斬滅妖精神王一怒五嶽摧傾征束群魔豁落鬼兵千千截首萬萬剪形羅酆敢弑北都共營凶凶者戮善善者生六天沈魂一一録名違道者死順道者生飛游災殺敢變幽㝠急急如律令右北極妙籙乃北玄所祕上聖所宗佩受之士當設北極眞像具供養儀每年以龍行三日馬住五日猴所七日戌建九日及甲子庚申之日祭之每旦清心誦諸神呪凡滿萬遍可準成功所施即應實在精專微聲誦之聲高即恐驚神祇也忌生死穢觸即須解滌學士敬之正一眞人曰世間善信男女佩受北極妙籙依按修行可以摧滅精邪攝伏魔蜮代天行化助國濟民功滿之日克得度世長年名書仙籍七祖超昇位登天人輕慢祕文殃延祖考學眞之士宜勉之焉弟子某即日齎持法信恭詣天師眞人門下拜受太上北極伏魔神呪殺鬼籙一階佩受之後誓遵科約一旦有違甘當玉律不敢怨道咎師一如玄科律令太上北極伏魔神呪殺鬼籙請籙法詞太上北極伏魔神呪殺鬼籙請法詞維某年歲次某月某日某郷貫居奉道信士某詞稱本命某年月日時建生上屬北斗某星君注照即日謹齎法信叩頭恭詣龍虎山嗣漢天師門下拜受太上北極伏魔神呪殺鬼籙一階敬奉修行伏以北辰在象御天政於紫微大帝居中焕丹文於玉斗殲厥魔魅斬殺邪宗嘯命風雷宣行號令隨時呼吸飛六甲於六天按呪指揮攝萬神於萬炁縱横衝突者三十六將侍衛送迎者百億千兵威德難名功勳莫述或違嚴律甘受㝠誅克志奉行佇祈師命但某無任懇禱之至謹詞天師門下據弟子某齎持質信詣道自陳求受太上北帝伏魔神呪殺鬼籙一階及請眞師寳諱終身敬奉所據投詞即日告盟天地立誓三官破券分環依科傳撥給付如後籙一階太上北帝伏魔神呪殺鬼籙儀式正一修眞指要節目祖玄眞三師玉諱祖師三天扶教輔元大法師正一沖玄神化靜應顯佑眞君張道陵玄師嗣師太清演教妙道眞君張衝眞師系師太清昭化廣德眞君張魯經籍度三師法諱經師上清經籙南曹眞十玉府上𡖖都天大法主嗣漢四十二代天師張正常籍師上清經籙太極執法眞宰靈寳領教眞人都天大法主嗣漢四十三代天師張宇初度師上清寳籙靈寳領教玄化眞人南曹執法仙宰都天大法主嗣教四十四代天師張寧清臨壇法師名證盟師監度師保舉師天師正應先生曰碧霄結氣紫極分輝著四極之格言攝群魔之威力輕洩漏慢者結釁佩受精勤者降祥隱顯弗違人神共賴故我太上設教流傳世學由是歷代師眞對敭寳訓汲引有縁繩繩不絶我以夙慶世戴國恩紹正一之師稱振天目之宗緒第法籙傳世寖遠乃選良匠鋟木成書以久其傳若夫禁戒持守惻隱慈悲從古至人莫不如是登壇善信各宜滌除玄覽積行累功庶幾有願皆符自此超凡入妙昭然盟載可不愼歟天師廣微子曰我家以太上符籙濟度人天保鎮國祚千有五百餘歲矣祖訓孔昭奚庸贅贊惟我先眞君際遇聖朝混一區宇首見尊崇江南冠褐咸隸管領子襲教以來三朝帝闕疊被恩光恭遇龍飛特頒焕號以精嚴比虚靖謂祇肅似沖和加官徵例於唐朝胙土進封於留國做好事傳法籙俾紹先猷祈福貺禦民災欽承聖訓祈天永命敢不祗勤度籙傳符益彰開化上以對敭天子丕顯之命下以敷錫庶民皇極之休尚克時忱以介景福太上北極伏魔神呪殺鬼籙
