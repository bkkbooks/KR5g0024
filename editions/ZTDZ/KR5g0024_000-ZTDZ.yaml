  text: 太上北極伏魔神呪殺鬼籙物五據某郷貫居住奉道信士某詞稱本命某年月日時建生上屬北斗某星君即日謹齎法信叩頭恭詣龍虎山嗣漢天師門下拜受太上北極伏魔神呪殺鬼籙一階佐天行化助國救民斷滅邪精消災度厄有違盟約身墮㝠愆一如玄科律令北極天蓬大將領兵三十萬人北極黑煞大將領兵三十萬人北極八景大神領兵三十萬人北極十天大神領兵三十萬人北極十天大魔王領兵三十萬人北極六宫大魔王領兵三十萬人北極隂境飛雷電吏領兵三十萬人北極豁落北斗七元大將軍領兵三十萬人北極天騶甲卒天丁力士領兵三十萬人北極大威力士領兵三十萬人北極衛靈大神領兵三十萬人北極巨獸大神領兵三十萬人北極飛龍騎大將軍領兵三十萬人北極飛虎騎大將軍領兵三十萬人北極三五將軍領兵三十萬人北極破邪將軍領兵三十萬人北極收魂將軍領兵三十萬人北極治病將軍領兵三十萬人北極北斗火炬使者領兵三十萬人北極南斗殺鬼使者領兵三十萬人北極六甲大神領兵三十萬人北極六丁大神領兵三十萬人北極神呪勑緫監大將軍百二十人北極神呪勑元陽大將軍百二十人北極神呪勑平天大將軍百二十人北極神呪勑飛天大將軍百二十人北極神呪勑丹田大將軍百二十人北極神呪勑氣大將軍百二十人北極神呪勑水大將軍百二十人北極神呪勑火大將軍百二十人北極神呪勑遊神大將軍百二十人北極神呪勑破泉大將軍百二十人北極神呪勑召魂大將軍百二十人北極神呪勑刀兵大將軍百二十人北極神呪勑神祠大將軍百二十人北極神呪勑劍刃大將軍百二十人北極神呪勑石大將軍百二十人北極神呪勑鬼大將軍百二十人北極神呪勑蜚尸大將軍百二十人北極神呪勑病大將軍百二十人北極神呪勑斷瘟大將軍百二十人北極神呪勑毒大將軍百二十人北極神呪勑殃咎大將軍百二十人北極神呪勑虎大將軍百二十人北極神呪勑蛇大將軍百二十人北極神呪勑蜂大將軍百二十人北極神呪勑蟲蝎大將軍百二十人北極神呪勑精邪大將軍百二十人北極神呪勑魑魅大將軍百二十人北極神呪勑魍魎大將軍百二十人
